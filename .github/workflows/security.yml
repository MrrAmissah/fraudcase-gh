name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high

  provenance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 20

      - name: Check recent commits for AI co-author trailers
        run: |
          if git log -20 --format=%B | grep -Ei 'Co-authored-by:.*(Claude|ChatGPT|OpenAI|Anthropic)'; then
            echo "AI co-author trailer found in recent commits."
            exit 1
          fi
          echo "Provenance check passed."
